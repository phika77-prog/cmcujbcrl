<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>의정부성모병원 연구부</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">의정부성모병원 연구부</p>
        <h1>연구지원과 협업을 한눈에</h1>
        <p>
          공지사항, 캘린더, 업적, 장비, MSDS와 문의까지 연구부 운영에 필요한
          정보를 한 페이지에서 확인할 수 있습니다.
        </p>
      </div>
    </header>

    <main>
      <section class="panel" id="notices">
        <div class="panel__title-row">
          <h2>공지사항</h2>
          <span class="panel__hint">브라우저에 저장됩니다</span>
        </div>
        <div class="content-list" id="noticesList"></div>
        <div class="content-admin" id="noticesAdmin"></div>
      </section>

      <section class="panel panel--split" id="calendar">
        <div class="calendar-shell">
          <div class="panel__title-row">
            <h2>과제 캘린더</h2>
            <div class="calendar-nav" aria-label="달력 이동">
              <button type="button" class="calendar-nav__button" id="prevMonthBtn">‹</button>
              <div class="calendar-month-label" id="calendarMonthLabel">July 2026</div>
              <button type="button" class="calendar-nav__button" id="nextMonthBtn">›</button>
            </div>
          </div>
          <div class="announcement-stats" id="announcementStats"></div>
          <div class="calendar">
            <div class="calendar__weekdays">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div class="calendar__days" id="calendarDays"></div>
          </div>
        </div>
        <aside class="calendar__details" id="calendarDetails">
          <h3>선택된 일정</h3>
          <p class="calendar__empty">날짜를 선택하면 해당 일정이 표시됩니다.</p>
        </aside>
      </section>

      <section class="panel" id="announcements">
        <div class="panel__title-row">
          <h2>IACF 공고</h2>
          <span class="panel__hint">매일 오전 8시 자동 갱신 대상</span>
        </div>
        <div class="announcement-list" id="announcementList"></div>
      </section>

      <section class="panel" id="achievements">
        <div class="panel__title-row">
          <h2>연구업적</h2>
        </div>
        <div class="content-list" id="achievementsList"></div>
        <div class="content-admin" id="achievementsAdmin"></div>
      </section>

      <section class="panel" id="patents">
        <div class="panel__title-row">
          <h2>특허</h2>
        </div>
        <div class="content-list" id="patentsList"></div>
        <div class="content-admin" id="patentsAdmin"></div>
      </section>

      <section class="panel" id="equipment">
        <div class="panel__title-row">
          <h2>연구장비</h2>
        </div>
        <div class="content-list" id="equipmentList"></div>
        <div class="content-admin" id="equipmentAdmin"></div>
      </section>

      <section class="panel" id="msds">
        <div class="panel__title-row">
          <h2>MSDS</h2>
        </div>
        <div class="content-list" id="msdsList"></div>
        <div class="content-admin" id="msdsAdmin"></div>
      </section>

      <section class="panel" id="contact">
        <div class="panel__title-row">
          <h2>문의</h2>
        </div>
        <form class="contact-form">
          <label>
            이름
            <input type="text" placeholder="홍길동" />
          </label>
          <label>
            이메일
            <input type="email" placeholder="example@hospital.org" />
          </label>
          <label>
            내용
            <textarea rows="5" placeholder="문의 내용을 입력해주세요."></textarea>
          </label>
          <button class="button" type="submit">보내기</button>
        </form>
      </section>
    </main>

    <script src="content-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
